background {
    monitor =
    path = /home/dibas/wallpaper/wall10.png
    blur_passes = 1
    blur_size = 5
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(89b4fa00)
    inner_color = rgba(11111b00)
    font_color = rgb(cdd6f4)
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[upd:1000] echo "12:33 AM"
    font_size = 100
	font_family = Rounded M+ 1c Bold
    position = 0, 100
    halign = center
    valign = center
}
